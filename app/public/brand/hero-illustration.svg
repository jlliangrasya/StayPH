<svg viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StayPH hero illustration — Philippine boarding houses at dusk">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDF8F4"/>
      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="380" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8D5C4"/>
      <stop offset="100%" stop-color="#D4C0AE"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A2E4A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>

  <!-- Decorative circles (bokeh / warmth) -->
  <circle cx="680" cy="80" r="60" fill="#FFB830" fill-opacity="0.08"/>
  <circle cx="720" cy="60" r="40" fill="#FF6B4A" fill-opacity="0.06"/>
  <circle cx="100" cy="120" r="80" fill="#FF6B4A" fill-opacity="0.05"/>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="110" fill="url(#groundGrad)"/>

  <!-- Road / path -->
  <rect x="0" y="405" width="800" height="30" fill="#D4BAA4" fill-opacity="0.5"/>
  <!-- Road dashes -->
  <rect x="60" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <rect x="180" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <rect x="300" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <rect x="420" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <rect x="540" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>
  <rect x="660" y="418" width="60" height="4" rx="2" fill="white" fill-opacity="0.4"/>

  <!-- === BUILDING 1 (Far left, smaller) === -->
  <g filter="url(#softShadow)">
    <rect x="30" y="280" width="100" height="130" rx="3" fill="#C4A98A"/>
    <!-- Roof -->
    <path d="M22 284L80 250L138 284Z" fill="#B8956E"/>
    <!-- Windows -->
    <rect x="45" y="300" width="22" height="18" rx="2" fill="#FFB830" fill-opacity="0.7"/>
    <rect x="80" y="300" width="22" height="18" rx="2" fill="#FFB830" fill-opacity="0.5"/>
    <rect x="45" y="335" width="22" height="18" rx="2" fill="#FFF3D4" fill-opacity="0.6"/>
    <rect x="80" y="335" width="22" height="18" rx="2" fill="#FFF3D4" fill-opacity="0.4"/>
    <!-- Door -->
    <rect x="67" y="370" width="26" height="40" rx="3" fill="#A07850"/>
  </g>

  <!-- === BUILDING 2 (Center-left, tall — the PREFERRED one) === -->
  <g filter="url(#softShadow)">
    <rect x="160" y="220" width="140" height="190" rx="4" fill="#E8D4BE"/>
    <!-- Roof (coral — standout) -->
    <path d="M148 226L230 180L312 226Z" fill="#FF6B4A"/>
    <!-- Top floor windows -->
    <rect x="178" y="242" width="28" height="22" rx="2" fill="#FFB830" fill-opacity="0.9"/>
    <rect x="224" y="242" width="28" height="22" rx="2" fill="#FFB830" fill-opacity="0.9"/>
    <!-- 2nd floor windows -->
    <rect x="178" y="280" width="28" height="22" rx="2" fill="#FFB830" fill-opacity="0.7"/>
    <rect x="224" y="280" width="28" height="22" rx="2" fill="#FFF3D4" fill-opacity="0.8"/>
    <!-- 3rd floor windows -->
    <rect x="178" y="318" width="28" height="22" rx="2" fill="#FFF3D4" fill-opacity="0.6"/>
    <rect x="224" y="318" width="28" height="22" rx="2" fill="#FFB830" fill-opacity="0.6"/>
    <!-- Door -->
    <rect x="206" y="360" width="36" height="50" rx="4" fill="#C47840"/>
    <!-- Door handle -->
    <circle cx="236" cy="387" r="3" fill="#FFB830"/>

    <!-- === PREFERRED PIN === -->
    <g>
      <!-- Pin shadow -->
      <ellipse cx="230" cy="175" rx="12" ry="4" fill="#1A2E4A" fill-opacity="0.15"/>
      <!-- Pin body -->
      <path d="M230 120C219.5 120 211 128.5 211 139C211 152 230 172 230 172C230 172 249 152 249 139C249 128.5 240.5 120 230 120Z" fill="#FF6B4A"/>
      <circle cx="230" cy="139" r="9" fill="white"/>
      <!-- Star inside pin -->
      <path d="M230 132.5L231.545 137.41H236.708L232.581 140.395L234.127 145.305L230 142.32L225.873 145.305L227.419 140.395L223.292 137.41H228.455L230 132.5Z" fill="#FF6B4A"/>
      <!-- Pulse ring animation -->
      <circle cx="230" cy="139" r="20" fill="#FF6B4A" fill-opacity="0.15">
        <animate attributeName="r" from="12" to="28" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Preferred badge below pin -->
    <rect x="184" y="88" width="92" height="26" rx="13" fill="#1A2E4A"/>
    <text x="230" y="105" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFB830" text-anchor="middle">⭐ Preferred</text>
  </g>

  <!-- === BUILDING 3 (Center-right) === -->
  <g filter="url(#softShadow)">
    <rect x="330" y="250" width="120" height="160" rx="3" fill="#D4BEAA"/>
    <!-- Flat roof / parapet -->
    <rect x="322" y="244" width="136" height="14" rx="3" fill="#C4A890"/>
    <!-- Windows -->
    <rect x="350" y="268" width="24" height="20" rx="2" fill="#FFF3D4" fill-opacity="0.7"/>
    <rect x="392" y="268" width="24" height="20" rx="2" fill="#FFB830" fill-opacity="0.8"/>
    <rect x="350" y="304" width="24" height="20" rx="2" fill="#FFB830" fill-opacity="0.6"/>
    <rect x="392" y="304" width="24" height="20" rx="2" fill="#FFF3D4" fill-opacity="0.5"/>
    <rect x="350" y="340" width="24" height="20" rx="2" fill="#FFF3D4" fill-opacity="0.4"/>
    <rect x="392" y="340" width="24" height="20" rx="2" fill="#FFB830" fill-opacity="0.5"/>
    <!-- Door -->
    <rect x="373" y="368" width="28" height="42" rx="3" fill="#B08060"/>
    <!-- Small balcony rail -->
    <rect x="344" y="290" width="36" height="4" rx="1" fill="#B09070" fill-opacity="0.6"/>
    <rect x="386" y="290" width="36" height="4" rx="1" fill="#B09070" fill-opacity="0.6"/>
  </g>

  <!-- === BUILDING 4 (Right) === -->
  <g filter="url(#softShadow)">
    <rect x="480" y="265" width="110" height="145" rx="3" fill="#C8AE94"/>
    <!-- Pitched roof -->
    <path d="M470 270L535 235L600 270Z" fill="#E07050"/>
    <!-- Windows -->
    <rect x="498" y="285" width="22" height="18" rx="2" fill="#FFF3D4" fill-opacity="0.6"/>
    <rect x="538" y="285" width="22" height="18" rx="2" fill="#FFB830" fill-opacity="0.7"/>
    <rect x="498" y="318" width="22" height="18" rx="2" fill="#FFB830" fill-opacity="0.5"/>
    <rect x="538" y="318" width="22" height="18" rx="2" fill="#FFF3D4" fill-opacity="0.5"/>
    <rect x="498" y="351" width="22" height="18" rx="2" fill="#FFF3D4" fill-opacity="0.4"/>
    <rect x="538" y="351" width="22" height="18" rx="2" fill="#FFB830" fill-opacity="0.4"/>
    <!-- Door -->
    <rect x="518" y="370" width="28" height="40" rx="3" fill="#A07858"/>
  </g>

  <!-- === BUILDING 5 (Far right) === -->
  <g filter="url(#softShadow)">
    <rect x="620" y="300" width="90" height="110" rx="3" fill="#BAA090"/>
    <path d="M612 306L665 275L718 306Z" fill="#C07050"/>
    <rect x="638" y="318" width="18" height="16" rx="2" fill="#FFB830" fill-opacity="0.5"/>
    <rect x="670" y="318" width="18" height="16" rx="2" fill="#FFF3D4" fill-opacity="0.4"/>
    <rect x="638" y="348" width="18" height="16" rx="2" fill="#FFF3D4" fill-opacity="0.4"/>
    <rect x="670" y="348" width="18" height="16" rx="2" fill="#FFB830" fill-opacity="0.4"/>
    <rect x="651" y="370" width="24" height="40" rx="3" fill="#9C7858"/>
  </g>

  <!-- === STUDENT FIGURE (walking toward preferred building) === -->
  <g>
    <!-- Shadow -->
    <ellipse cx="590" cy="408" rx="18" ry="5" fill="#1A2E4A" fill-opacity="0.1"/>
    <!-- Body -->
    <rect x="580" y="370" width="20" height="30" rx="6" fill="#1A2E4A"/>
    <!-- Head -->
    <circle cx="590" cy="362" r="11" fill="#C87A50"/>
    <!-- Hair -->
    <path d="M579 360C579 354 584.5 351 590 351C595.5 351 601 354 601 360H579Z" fill="#2D1A0A"/>
    <!-- Backpack -->
    <rect x="597" y="372" width="14" height="20" rx="4" fill="#FF6B4A"/>
    <rect x="599" y="375" width="10" height="3" rx="1.5" fill="#E5532F"/>
    <rect x="599" y="382" width="10" height="3" rx="1.5" fill="#E5532F"/>
    <!-- Legs (walking pose) -->
    <path d="M584 400L580 420" stroke="#1A2E4A" stroke-width="5" stroke-linecap="round"/>
    <path d="M596 400L600 418" stroke="#1A2E4A" stroke-width="5" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="579" cy="421" rx="7" ry="4" fill="#2D1A0A"/>
    <ellipse cx="601" cy="419" rx="7" ry="4" fill="#2D1A0A"/>
    <!-- Arms -->
    <path d="M580 378L572 390" stroke="#C87A50" stroke-width="4" stroke-linecap="round"/>
    <path d="M600 378L608 388" stroke="#C87A50" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Trees -->
  <g>
    <rect x="140" y="360" width="10" height="40" rx="3" fill="#8B6A4A"/>
    <circle cx="145" cy="348" r="22" fill="#5A8A4A"/>
    <circle cx="132" cy="355" r="15" fill="#4A7A3A"/>
    <circle cx="158" cy="353" r="16" fill="#6A9A5A"/>
  </g>
  <g>
    <rect x="455" y="368" width="8" height="35" rx="3" fill="#8B6A4A"/>
    <circle cx="459" cy="358" r="18" fill="#5A8A4A"/>
    <circle cx="447" cy="363" r="12" fill="#4A7A3A"/>
  </g>
  <g>
    <rect x="735" y="368" width="9" height="40" rx="3" fill="#8B6A4A"/>
    <circle cx="739.5" cy="356" r="20" fill="#6A9A5A"/>
    <circle cx="728" cy="362" r="13" fill="#4A7A3A"/>
  </g>

  <!-- Street lamp -->
  <rect x="128" y="330" width="5" height="75" rx="2" fill="#8B7A6A"/>
  <path d="M133 330Q148 325 150 340" stroke="#8B7A6A" stroke-width="3" fill="none"/>
  <ellipse cx="150" cy="341" rx="8" ry="5" fill="#FFE082" fill-opacity="0.9"/>
  <ellipse cx="150" cy="341" rx="8" ry="5" fill="#FFB830" fill-opacity="0.3">
    <animate attributeName="fill-opacity" from="0.3" to="0.6" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3"/>
  </ellipse>

  <!-- Small floating trust chips -->
  <g>
    <rect x="490" y="205" width="110" height="28" rx="14" fill="white" fill-opacity="0.92"/>
    <circle cx="510" cy="219" r="8" fill="#34A853"/>
    <path d="M506 219.5L509 222.5L515 216" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="523" y="224" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A2E4A">Verified ₱4,500/mo</text>
  </g>
  <g>
    <rect x="50" y="210" width="96" height="28" rx="14" fill="white" fill-opacity="0.92"/>
    <circle cx="68" cy="224" r="8" fill="#FF6B4A"/>
    <text x="61" y="228" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" fill="white" font-weight="700" text-anchor="middle">4.9</text>
    <text x="82" y="228" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1A2E4A">★ Near USC</text>
  </g>

  <!-- Decorative dots (floating) -->
  <circle cx="760" cy="180" r="5" fill="#FF6B4A" fill-opacity="0.4"/>
  <circle cx="780" cy="200" r="3" fill="#FFB830" fill-opacity="0.5"/>
  <circle cx="750" cy="210" r="4" fill="#FF6B4A" fill-opacity="0.3"/>
  <circle cx="60" cy="380" r="4" fill="#FFB830" fill-opacity="0.4"/>
  <circle cx="40" cy="360" r="3" fill="#FF6B4A" fill-opacity="0.3"/>
</svg>
