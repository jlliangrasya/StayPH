<svg viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="No results found illustration">
  <defs>
    <linearGradient id="bgNoResults" x1="0" y1="0" x2="400" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDF8F4"/>
      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bgNoResults)" rx="16"/>

  <!-- Street base -->
  <rect x="0" y="220" width="400" height="60" fill="#E8D5C4" rx="0"/>

  <!-- Empty building outlines (ghosted) -->
  <rect x="40" y="130" width="80" height="100" rx="3" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M32 136L80 105L128 136Z" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="170" y="115" width="100" height="115" rx="3" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M160 122L220 88L280 122Z" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="290" y="145" width="75" height="85" rx="3" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M282 151L327 122L372 151Z" fill="none" stroke="#C4A890" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Big magnifying glass -->
  <circle cx="200" cy="148" r="58" fill="white" fill-opacity="0.7" stroke="#FF6B4A" stroke-width="7"/>
  <circle cx="200" cy="148" r="44" fill="white" fill-opacity="0.5"/>
  <line x1="244" y1="192" x2="272" y2="220" stroke="#FF6B4A" stroke-width="9" stroke-linecap="round"/>

  <!-- Question marks inside lens -->
  <text x="200" y="162" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="40" font-weight="800" fill="#FF6B4A" fill-opacity="0.3" text-anchor="middle">?</text>

  <!-- Small house inside lens (ghosted) -->
  <path d="M182 158L200 142L218 158" stroke="#FF6B4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill-opacity="0.4"/>
  <rect x="187" y="157" width="26" height="18" rx="2" stroke="#FF6B4A" stroke-width="2" fill="#FF6B4A" fill-opacity="0.1"/>

  <!-- Text -->
  <text x="200" y="250" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2E4A" text-anchor="middle">No listings found</text>
  <text x="200" y="268" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#8B7A6A" text-anchor="middle">Try adjusting your filters or search a nearby area</text>
</svg>
